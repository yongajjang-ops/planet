// ─── Math ──────────────────────────────────────────────────────────────────
const D2R = Math.PI / 180;
const R2D = 180 / Math.PI;
const rad  = d => d * D2R;
const deg  = r => r * R2D;
const n360 = a => ((a % 360) + 360) % 360;

// ─── Time ──────────────────────────────────────────────────────────────────
function jd(date) { return date.getTime() / 86400000 + 2440587.5; }
function obliquity(T) { return 23.439291111 - 0.013004167*T - 1.639e-7*T*T + 5.036e-7*T*T*T; }
function gmst(JD) {
  const T = (JD - 2451545) / 36525;
  return n360(280.46061837 + 360.98564736629*(JD-2451545) + 3.87933e-4*T*T - T*T*T/38710000);
}
function lst(JD, lon) { return n360(gmst(JD) + lon); }

// ─── Kepler ────────────────────────────────────────────────────────────────
function kepler(M, e) {
  let E = M;
  for (let i = 0; i < 60; i++) {
    const dE = (M - E + e*Math.sin(E)) / (1 - e*Math.cos(E));
    E += dE;
    if (Math.abs(dE) < 1e-11) break;
  }
  return E;
}

// ─── Heliocentric ecliptic XYZ ─────────────────────────────────────────────
function helio(el, T) {
  const a = el.a + el.da*T, e = el.e + el.de*T;
  const I = el.I + el.dI*T, ww = el.w + el.dw*T;
  const L = n360(el.L + el.dL*T), Omega = el.O + el.dO*T;
  const omega = n360(ww - Omega);
  const E = kepler(rad(n360(L - ww)), e);
  const nu = 2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2), Math.sqrt(1-e)*Math.cos(E/2));
  const r = a*(1 - e*Math.cos(E));
  const u = nu + rad(omega);
  const IR = rad(I), OR = rad(Omega);
  return {
    x: r*(Math.cos(OR)*Math.cos(u) - Math.sin(OR)*Math.sin(u)*Math.cos(IR)),
    y: r*(Math.sin(OR)*Math.cos(u) + Math.cos(OR)*Math.sin(u)*Math.cos(IR)),
    z: r*Math.sin(u)*Math.sin(IR)
  };
}

function ecl2eq(x, y, z, eps) {
  const e = rad(eps);
  return { x, y: y*Math.cos(e)-z*Math.sin(e), z: y*Math.sin(e)+z*Math.cos(e) };
}
function xyz2radec(x, y, z) {
  return { ra: n360(deg(Math.atan2(y,x))), dec: deg(Math.atan2(z,Math.sqrt(x*x+y*y))) };
}
function radec2altaz(ra, dec, LST, lat) {
  const H = rad(n360(LST-ra)), dR = rad(dec), lR = rad(lat);
  const sinA = Math.sin(dR)*Math.sin(lR) + Math.cos(dR)*Math.cos(lR)*Math.cos(H);
  const alt  = deg(Math.asin(Math.max(-1,Math.min(1,sinA))));
  const cosZ = (Math.sin(dR)-Math.sin(rad(alt))*Math.sin(lR))/(Math.cos(rad(alt))*Math.cos(lR));
  let az = deg(Math.acos(Math.max(-1,Math.min(1,cosZ))));
  if (Math.sin(H) > 0) az = 360-az;
  return { alt, az };
}

// ─── Sun ───────────────────────────────────────────────────────────────────
function sunPosition(JD, lat, lon) {
  const T = (JD-2451545)/36525;
  const L0 = n360(280.46646+36000.76983*T);
  const M  = n360(357.52911+35999.05029*T-1.537e-4*T*T), Mr = rad(M);
  const C  = (1.914602-4.817e-3*T-1.4e-5*T*T)*Math.sin(Mr)
           + (1.9993e-2-1.01e-4*T)*Math.sin(2*Mr) + 2.89e-4*Math.sin(3*Mr);
  const om  = 125.04-1934.136*T;
  const lam = n360(L0+C) - 0.00569 - 0.00478*Math.sin(rad(om));
  const eps = obliquity(T)+0.00256*Math.cos(rad(om));
  const lr  = rad(lam), er = rad(eps);
  const ra  = n360(deg(Math.atan2(Math.cos(er)*Math.sin(lr), Math.cos(lr))));
  const dc  = deg(Math.asin(Math.sin(er)*Math.sin(lr)));
  const {alt,az} = radec2altaz(ra, dc, lst(JD,lon), lat);
  return {id:'sun',name:'태양',color:'#ffd700',sz:9,ra,dec:dc,alt,az,dist:1};
}

function moonPosition(JD, lat, lon) {
  const T  = (JD-2451545)/36525;
  const L0 = n360(218.3164477+481267.88123421*T-1.5786e-3*T*T);
  const Mm = n360(134.9633964+477198.8675055*T +8.7414e-3*T*T);
  const Ms = n360(357.5291092+35999.0502909*T  -1.536e-4*T*T);
  const F  = n360(93.2720950 +483202.0175233*T -3.6539e-3*T*T);
  const D  = n360(297.8501921+445267.1114034*T -1.8819e-3*T*T);
  const dL = 6.289*Math.sin(rad(Mm))-1.274*Math.sin(rad(2*D-Mm))+0.658*Math.sin(rad(2*D))
           - 0.214*Math.sin(rad(2*Mm))-0.186*Math.sin(rad(Ms))-0.114*Math.sin(rad(2*F))
           + 0.059*Math.sin(rad(2*Mm-2*D))+0.057*Math.sin(rad(Mm-2*D+Ms))
           + 0.053*Math.sin(rad(Mm+2*D))+0.046*Math.sin(rad(2*D-Ms))
           + 0.041*Math.sin(rad(Mm-Ms))-0.035*Math.sin(rad(D))
           - 0.031*Math.sin(rad(Mm+Ms))-0.015*Math.sin(rad(2*F-2*D))+0.011*Math.sin(rad(Mm-4*D));
  const dB = 5.128*Math.sin(rad(F))+0.280*Math.sin(rad(Mm+F))+0.277*Math.sin(rad(Mm-F))
           + 0.173*Math.sin(rad(2*D-F))+0.055*Math.sin(rad(2*D-Mm+F))
           - 0.046*Math.sin(rad(2*D-Mm-F))+0.033*Math.sin(rad(2*D+F))+0.017*Math.sin(rad(2*Mm+F));
  const lam = rad(n360(L0+dL)), beta = rad(dB), eps = rad(obliquity(T));
  const ra  = n360(deg(Math.atan2(Math.sin(lam)*Math.cos(eps)-Math.tan(beta)*Math.sin(eps), Math.cos(lam))));
  const dc  = deg(Math.asin(Math.sin(beta)*Math.cos(eps)+Math.cos(beta)*Math.sin(eps)*Math.sin(lam)));
  const {alt,az} = radec2altaz(ra, dc, lst(JD,lon), lat);
  return {id:'moon',name:'달',color:'#dde8ff',sz:7,ra,dec:dc,alt,az,dist:0.00257};
}

// ─── Planet ────────────────────────────────────────────────────────────────
function planetPos(body, JD, lat, lon) {
  const T   = (JD-2451545)/36525;
  const eps = obliquity(T);
  const earth = ecl2eq(...Object.values(helio(EARTH_EL,T)), eps);
  const p     = helio(body,T);
  const peq   = ecl2eq(p.x,p.y,p.z,eps);
  const gx = peq.x-earth.x, gy = peq.y-earth.y, gz = peq.z-earth.z;
  const dist = Math.sqrt(gx*gx+gy*gy+gz*gz);
  const {ra,dec} = xyz2radec(gx,gy,gz);
  const {alt,az} = radec2altaz(ra,dec,lst(JD,lon),lat);
  return {...body, ra, dec, alt, az, dist};
}

// ─── Canvas & state ────────────────────────────────────────────────────────
const canvas = document.getElementById('sky-canvas');
const ctx    = canvas.getContext('2d');
let CW = 0, allBodies = [], selId = null, stars = null;
let compassSmooth = null;   // 저역통과 필터 적용된 표시 방위
let starAltAz = [];         // 계산된 별 위치 캐시

function computeStars(JD, lat, lon) {
  const LST = lst(JD, lon);
  const starById = {};
  starAltAz = STAR_DATA.map(([id, name, ko, raH, dec, mag, color]) => {
    const { alt, az } = radec2altaz(raH * 15, dec, LST, lat);
    const s = { id, name, ko, mag, color, alt, az };
    starById[id] = s;
    return s;
  });
  starAltAz._byId = starById;
}

function resize() {
  const w = document.getElementById('sky-wrap').clientWidth - 20;
  CW = Math.min(w, 480);
  canvas.width = canvas.height = CW;
  stars = null;
  if (allBodies.length) drawSky();
}

function mkStars() {
  stars = [];
  const r = CW/2 - 6;
  for (let i = 0; i < 60; i++) {
    const a = Math.random()*2*Math.PI, rs = Math.random()*r;
    stars.push({x: CW/2+rs*Math.cos(a), y: CW/2+rs*Math.sin(a),
                r: Math.random()*0.7+0.1, a: Math.random()*0.25+0.08});
  }
}

// alt/az → 캔버스 좌표 (회전 전 기준, N=위)
function altaz2xy(alt, az) {
  const r = CW/2 - 6;
  const rho = (1 - alt/90) * r;
  return {x: CW/2 + rho*Math.sin(rad(az)), y: CW/2 - rho*Math.cos(rad(az))};
}

// ─── 통합 하늘+나침반 그리기 ───────────────────────────────────────────────
function drawSky() {
  if (!CW) return;
  const cx = CW/2, cy = CW/2, R = CW/2 - 6;

  // 나침반 회전량: 기기가 h° 방향을 보면 하늘을 -h° 회전해 실제 북이 위로 오게 함
  const h   = compassSmooth !== null ? compassSmooth : 0;
  const rot = -rad(h);

  ctx.clearRect(0, 0, CW, CW);

  // ── 하늘 배경 (클리핑 원) ─────────────────────────────────────────────
  const skyG = ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  skyG.addColorStop(0,   '#0d1a3a');
  skyG.addColorStop(0.6, '#060e22');
  skyG.addColorStop(1,   '#020810');
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2*Math.PI);
  ctx.fillStyle = skyG;
  ctx.fill();
  ctx.clip();

  // ── 회전 그룹 (방위에 따라 함께 돌아감) ──────────────────────────────
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.translate(-cx, -cy);

  // 배경 랜덤 별
  if (!stars) mkStars();
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, 2*Math.PI);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });

  // 별자리 선
  if (starAltAz.length) {
    const byId = starAltAz._byId || {};
    ctx.save();
    ctx.lineWidth = 0.9;
    ctx.setLineDash([5, 7]);
    Object.entries(CON_LINES).forEach(([, lines]) => {
      lines.forEach(([id1, id2]) => {
        const s1 = byId[id1], s2 = byId[id2];
        if (!s1 || !s2 || s1.alt <= 0 || s2.alt <= 0) return;
        const p1 = altaz2xy(s1.alt, s1.az), p2 = altaz2xy(s2.alt, s2.az);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = 'rgba(110,160,255,0.28)';
        ctx.stroke();
      });
    });
    ctx.setLineDash([]);
    ctx.restore();
  }

  // 주요 별 & 별자리 레이블
  if (starAltAz.length) {
    const byId = starAltAz._byId || {};
    starAltAz.forEach(s => {
      if (s.alt <= 0) return;
      if (s.mag > 2.5) return;
      const {x, y} = altaz2xy(s.alt, s.az);
      const sz = Math.max(1.2, 3.8 - s.mag * 0.75);

      // 밝은 별 글로우
      if (s.mag < 1.5) {
        const gr = sz * (s.mag < 0 ? 5.5 : 4);
        const gd = ctx.createRadialGradient(x, y, 0, x, y, gr);
        gd.addColorStop(0, (s.color||'#fff') + '70');
        gd.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(x, y, gr, 0, 2*Math.PI);
        ctx.fillStyle = gd; ctx.fill();
      }

      // 별 점
      ctx.beginPath(); ctx.arc(x, y, sz, 0, 2*Math.PI);
      ctx.fillStyle = s.color || '#e8f0ff'; ctx.fill();

      // 한글 이름 (mag < 1.5 & 이름 있음)
      if (s.ko && s.mag < 1.5) {
        ctx.save();
        ctx.translate(x + sz + 4, y - 1);
        ctx.rotate(-rot);
        ctx.fillStyle = (s.color||'#ffffff') + 'cc';
        ctx.font = '9px sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(s.ko, 0, 0);
        ctx.restore();
      }
    });

    // 북극성 강조 레이블
    const pol = byId['polaris'];
    if (pol && pol.alt > 0) {
      const {x, y} = altaz2xy(pol.alt, pol.az);
      ctx.save();
      ctx.translate(x + 7, y - 1);
      ctx.rotate(-rot);
      ctx.fillStyle = '#ffffaacc';
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText('★ 북극성', 0, 0);
      ctx.restore();
    }

    // 별자리 이름
    Object.entries(CON_LABEL).forEach(([, [refId, name]]) => {
      const ref = byId[refId];
      if (!ref || ref.alt <= 0) return;
      const {x, y} = altaz2xy(ref.alt, ref.az);
      ctx.save();
      ctx.translate(x, y - 20);
      ctx.rotate(-rot);
      ctx.fillStyle = 'rgba(140,185,255,0.6)';
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(name, 0, 0);
      ctx.restore();
    });
  }

  // 고도 링 (원이라 회전 무관하지만, 눈금 레이블은 역회전으로 가독성 유지)
  [30, 60].forEach(alt => {
    const rr = (1-alt/90)*R;
    ctx.beginPath();
    ctx.arc(cx, cy, rr, 0, 2*Math.PI);
    ctx.strokeStyle = 'rgba(80,130,220,0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 8]);
    ctx.stroke();
    ctx.setLineDash([]);
    // 레이블은 항상 읽기 쉽게 역회전
    ctx.save();
    ctx.translate(cx + rr + 3, cy);
    ctx.rotate(-rot);
    ctx.fillStyle = 'rgba(80,130,220,0.3)';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(`${alt}°`, 0, 0);
    ctx.restore();
  });

  // 방위선
  [0, 90, 180, 270].forEach(az => {
    const {x,y} = altaz2xy(0, az);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x, y);
    ctx.strokeStyle = 'rgba(80,130,220,0.1)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // 나침반 눈금 (베젤 안쪽, 매 10°)
  for (let i = 0; i < 36; i++) {
    const a     = rad(i*10);
    const outer = R - 2;
    const inner = i % 9 === 0 ? R-14 : (i % 3 === 0 ? R-10 : R-7);
    ctx.beginPath();
    ctx.moveTo(cx + Math.sin(a)*outer, cy - Math.cos(a)*outer);
    ctx.lineTo(cx + Math.sin(a)*inner, cy - Math.cos(a)*inner);
    ctx.strokeStyle = i % 9 === 0 ? 'rgba(160,190,255,0.55)' : 'rgba(80,120,200,0.25)';
    ctx.lineWidth   = i % 9 === 0 ? 1.2 : 0.7;
    ctx.stroke();
  }

  // 방위 레이블 (N/E/S/W)
  const dirs = [
    ['N', 0,   '#ff2200', 32],
    ['E', 90,  '#ffffff', 26],
    ['S', 180, '#ffffff', 26],
    ['W', 270, '#ffffff', 26],
  ];
  dirs.forEach(([en, az, col, fs]) => {
    const {x, y} = altaz2xy(2, az);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-rot);

    // 배경 캡슐
    const bw = fs * 2.2, bh = fs * 1.8, br = 7;
    ctx.fillStyle = 'rgba(0,4,18,0.82)';
    ctx.strokeStyle = col + '88';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-bw/2 + br, -bh/2);
    ctx.arcTo( bw/2, -bh/2,  bw/2,  bh/2, br);
    ctx.arcTo( bw/2,  bh/2, -bw/2,  bh/2, br);
    ctx.arcTo(-bw/2,  bh/2, -bw/2, -bh/2, br);
    ctx.arcTo(-bw/2, -bh/2,  bw/2, -bh/2, br);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // 글로우 (두 번 겹쳐서 더 강하게)
    ctx.shadowColor = col;
    ctx.shadowBlur  = 18;
    ctx.fillStyle = col;
    ctx.font = `bold ${fs}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(en, 0, 0);
    ctx.fillText(en, 0, 0); // 두 번 그려 글로우 강화

    ctx.shadowBlur = 0;
    ctx.restore();
  });

  // 행성
  allBodies.forEach(b => {
    if (b.alt <= 0) return;
    const {x,y} = altaz2xy(b.alt, b.az);
    b._rawX = x; b._rawY = y;   // 회전 전 좌표 (클릭 판정용)

    // 글로우
    const gd = ctx.createRadialGradient(x,y,0,x,y,b.sz*3.5);
    gd.addColorStop(0, b.color+'aa');
    gd.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(x, y, b.sz*3.5, 0, 2*Math.PI);
    ctx.fillStyle = gd; ctx.fill();

    // 점
    ctx.beginPath();
    ctx.arc(x, y, b.sz, 0, 2*Math.PI);
    ctx.fillStyle = b.color; ctx.fill();

    // 선택 링
    if (b.id === selId) {
      ctx.beginPath();
      ctx.arc(x, y, b.sz+4, 0, 2*Math.PI);
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 1.5; ctx.stroke();
    }

    // 이름 레이블 (역회전으로 항상 읽기 쉽게)
    ctx.save();
    ctx.translate(x + b.sz + 5, y);
    ctx.rotate(-rot);
    ctx.fillStyle = b.color;
    ctx.font = `${b.sz > 5 ? 11 : 10}px sans-serif`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(b.name, 0, 0);
    ctx.restore();
  });

  ctx.restore(); // ── 회전 그룹 끝 ──

  // ── 고정 오버레이 (회전 안 함) ──────────────────────────────────────
  drawNeedle(cx, cy, R);

  ctx.restore(); // ── 클리핑 끝 ──

  // 외부 베젤 링
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2*Math.PI);
  ctx.strokeStyle = compassSmooth !== null
    ? 'rgba(100,160,255,0.35)'
    : 'rgba(80,130,220,0.2)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 천정 레이블
  ctx.fillStyle = 'rgba(80,130,220,0.3)';
  ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('천정', cx, cy - R + 12);
}

// ─── 중앙 나침반 바늘 ──────────────────────────────────────────────────────
function drawNeedle(cx, cy, R) {
  const L = R * 0.22;   // 바늘 길이

  ctx.save();
  ctx.translate(cx, cy);

  // 바늘 그림자
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowBlur  = 6;

  // 북쪽 (위, 빨강)
  ctx.beginPath();
  ctx.moveTo(0, -L);
  ctx.lineTo(-5.5, 0);
  ctx.lineTo(0,  5);
  ctx.lineTo(5.5, 0);
  ctx.closePath();
  ctx.fillStyle = '#ff3333';
  ctx.fill();

  // 남쪽 (아래, 흰색)
  ctx.beginPath();
  ctx.moveTo(0,  L);
  ctx.lineTo(-5.5, 0);
  ctx.lineTo(0, -5);
  ctx.lineTo(5.5, 0);
  ctx.closePath();
  ctx.fillStyle = 'rgba(200,215,255,0.85)';
  ctx.fill();

  ctx.shadowBlur = 0;

  // 중심 원
  ctx.beginPath();
  ctx.arc(0, 0, 5, 0, 2*Math.PI);
  ctx.fillStyle = '#ddeeff';
  ctx.fill();
  ctx.strokeStyle = 'rgba(30,60,120,0.8)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 북 삼각형 고정 마커 (원 가장자리 상단)
  ctx.beginPath();
  ctx.moveTo(0, -(R-2));
  ctx.lineTo(-4, -(R-11));
  ctx.lineTo( 4, -(R-11));
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,80,60,0.75)';
  ctx.fill();

  ctx.restore();
}

// ─── 클릭 (역회전으로 좌표 변환) ──────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = CW / rect.width, sy = CW / rect.height;
  const mx = (e.clientX - rect.left)*sx;
  const my = (e.clientY - rect.top )*sy;
  const cx = CW/2, cy = CW/2;

  // 클릭 좌표를 하늘 회전 전 좌표계로 역변환
  const h  = rad(compassSmooth || 0);
  const dx = mx-cx, dy = my-cy;
  const rx = cx + dx*Math.cos(h) + dy*Math.sin(h);
  const ry = cy - dx*Math.sin(h) + dy*Math.cos(h);

  let hit = null, best = Infinity;
  allBodies.forEach(b => {
    if (b._rawX === undefined) return;
    const d = Math.hypot(rx - b._rawX, ry - b._rawY);
    if (d < 22 && d < best) { best = d; hit = b; }
  });

  if (hit) {
    selId = hit.id;
    showPopup(hit, e.clientX, e.clientY);
  } else {
    selId = null;
    document.getElementById('info-popup').style.display = 'none';
  }
  drawSky();
  renderList();
});

function showPopup(b, cx, cy) {
  const pop = document.getElementById('info-popup');
  document.getElementById('popup-title').textContent = b.name + (b.en ? ` (${b.en})` : '');
  document.getElementById('popup-title').style.color = b.color;
  document.getElementById('popup-body').innerHTML =
    `고도: ${b.alt.toFixed(2)}°<br>방위각: ${b.az.toFixed(2)}° (${az2dir(b.az)})<br>`+
    `적경: ${(b.ra/15).toFixed(3)}h<br>적위: ${b.dec.toFixed(3)}°<br>`+
    `거리: ${b.dist<0.01?(b.dist*149597870.7).toFixed(0)+' km':b.dist.toFixed(4)+' AU'}<br>`+
    `상태: ${b.alt>0?'🟢 관측 가능':'🔴 지평선 아래'}`;
  pop.style.display = 'block';
  const wr = document.getElementById('sky-wrap').getBoundingClientRect();
  let px = cx-wr.left+10, py = cy-wr.top-60;
  px = Math.max(4, Math.min(px, wr.width-175)); py = Math.max(4, py);
  pop.style.left = px+'px'; pop.style.top = py+'px';
}

// ─── 행성 목록 ────────────────────────────────────────────────────────────
const DIR16 = ['N','NNE','NE','ENE','E','ESE','SE','SSE',
               'S','SSW','SW','WSW','W','WNW','NW','NNW'];
function az2dir(az) { return DIR16[Math.round(az/22.5) % 16]; }

function renderList() {
  const el = document.getElementById('planet-list');
  const sorted = [...allBodies].sort((a,b) => b.alt-a.alt);
  el.innerHTML = sorted.map(b => `
    <div class="planet-row ${b.alt>0?'above':''} ${b.id===selId?'selected':''}" data-id="${b.id}">
      <div class="p-dot" style="background:${b.color}"></div>
      <div class="p-name" style="color:${b.color}">${b.name}</div>
      <div class="p-coords">
        고도 ${b.alt.toFixed(1)}° · 방위 ${b.az.toFixed(1)}° (${az2dir(b.az)})<br>
        거리 ${b.dist<0.01?(b.dist*149597870.7).toFixed(0)+' km':b.dist.toFixed(3)+' AU'}
      </div>
      <div class="p-badge ${b.alt>0?'badge-vis':'badge-hid'}">${b.alt>0?'관측 가능':'지평선 아래'}</div>
    </div>`).join('');
  el.querySelectorAll('.planet-row').forEach(row => {
    row.addEventListener('click', () => {
      const b = allBodies.find(x => x.id === row.dataset.id);
      if (!b) return;
      selId = b.id;
      drawSky(); renderList();
      if (b.alt > 0 && b._rawX !== undefined) {
        const wr  = document.getElementById('sky-wrap').getBoundingClientRect();
        const h   = rad(compassSmooth || 0);
        const dx  = b._rawX - CW/2, dy = b._rawY - CW/2;
        const scl = (wr.width-20) / CW;
        const sx  = wr.left + (CW/2 + dx*Math.cos(-h) - dy*Math.sin(-h)) * scl + 10;
        const sy  = wr.top  + (CW/2 + dx*Math.sin(-h) + dy*Math.cos(-h)) * scl - 60;
        showPopup(b, sx, sy);
      } else {
        showPopup(b, 80, 80);
      }
    });
  });
}

// ─── 하늘 상태 ────────────────────────────────────────────────────────────
function skyCondition() {
  const sun = allBodies.find(b => b.id==='sun');
  if (!sun) return;
  const a = sun.alt;
  const msg = a>6   ? '🌞 낮 — 행성 관측 불가'
            : a>0   ? '🌅 일출/일몰 — 수성·금성 탐색 가능'
            : a>-6  ? '🌆 시민 박명 — 밝은 행성 관측'
            : a>-12 ? '🌇 항해 박명 — 대부분 행성 관측'
            : a>-18 ? '🌃 천문 박명 — 거의 야간'
            :         '🌌 완전 야간 — 최적 관측';
  document.getElementById('sky-condition').textContent = msg;
}

// ─── 메인 업데이트 ────────────────────────────────────────────────────────
let userLat = 37.5665, userLon = 126.9780;

function updateAll() {
  const now = new Date();
  document.getElementById('time-display').textContent =
    now.toLocaleDateString('ko-KR',{year:'numeric',month:'short',day:'numeric'})+'  '+
    now.toLocaleTimeString('ko-KR');
  const JD = jd(now);
  computeStars(JD, userLat, userLon);
  allBodies = [
    sunPosition(JD, userLat, userLon),
    moonPosition(JD, userLat, userLon),
    ...BODIES.map(b => planetPos(b, JD, userLat, userLon))
  ];
  drawSky();
  renderList();
  skyCondition();
}

// ─── 나침반 (통합) ────────────────────────────────────────────────────────
const HEADING_BUF = [];
const BUF_SIZE    = 8;
let rawHeading    = null;
let compassRafId  = null;

function circularMean(angles) {
  let s=0, c=0;
  angles.forEach(a => { s += Math.sin(rad(a)); c += Math.cos(rad(a)); });
  return n360(deg(Math.atan2(s/angles.length, c/angles.length)));
}

function smoothAngle(cur, tgt, f) {
  if (cur === null) return tgt;
  let d = tgt - cur;
  while (d >  180) d -= 360;
  while (d < -180) d += 360;
  return cur + d * f;
}

function updateHeadingBar(h) {
  if (h === null) return;
  document.getElementById('heading-text').textContent = Math.round(h) + '°';
  document.getElementById('heading-dir').textContent  = az2dir(h);
  document.getElementById('heading-note').textContent = '';
}

// 센서 이벤트 → rawHeading 갱신만 (렌더링과 분리)
function onOrientation(e) {
  // 기기가 수평에 가까우면 자력계 신뢰도가 급락 → 업데이트 차단
  const tilt = Math.hypot(e.beta ?? 0, e.gamma ?? 0);  // 수평면 기준 기울기(도)
  if (tilt < 20) {
    document.getElementById('heading-note').textContent = '기기를 세워서 사용하세요';
    return;
  }

  // iOS: 나침반 정확도가 낮을 때 스킵
  if (e.webkitCompassAccuracy != null && e.webkitCompassAccuracy > 25) return;

  let h = null;
  if (e.webkitCompassHeading != null)  h = e.webkitCompassHeading;
  else if (e.alpha != null)            h = (360 - e.alpha) % 360;
  if (h === null) return;

  document.getElementById('heading-note').textContent = '';

  HEADING_BUF.push(h);
  if (HEADING_BUF.length > BUF_SIZE) HEADING_BUF.shift();
  rawHeading = circularMean(HEADING_BUF);

  if (!compassRafId) startCompassLoop();
}

// 단일 rAF 루프 — 저역통과 필터 후 하늘 전체 재그리기
function startCompassLoop() {
  function loop() {
    if (rawHeading !== null) {
      compassSmooth = smoothAngle(compassSmooth, rawHeading, 0.05);
      updateHeadingBar(compassSmooth);
      drawSky();
    }
    compassRafId = requestAnimationFrame(loop);
  }
  compassRafId = requestAnimationFrame(loop);
}

function requestCompass() {
  if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') {
          window.addEventListener('deviceorientationabsolute', onOrientation, true);
          window.addEventListener('deviceorientation',         onOrientation, true);
          document.getElementById('compass-btn').style.display  = 'none';
          document.getElementById('heading-note').textContent   = '기기를 수평으로 들어주세요';
        } else {
          document.getElementById('heading-note').textContent = '권한 거부됨';
        }
      });
  }
}

function initCompass() {
  if (typeof DeviceOrientationEvent === 'undefined') {
    document.getElementById('heading-note').textContent = '센서 없음 (데스크톱)';
    return;
  }
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+: 버튼으로 권한 요청
    document.getElementById('compass-btn').style.display  = 'inline-block';
    document.getElementById('heading-note').textContent   = '';
  } else {
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
    window.addEventListener('deviceorientation',         onOrientation, true);
    document.getElementById('heading-note').textContent = '기기를 수평으로 들어주세요';
  }
}

// ─── 위치 ─────────────────────────────────────────────────────────────────
function initLocation() {
  if (!navigator.geolocation) { startWithDefault('위치 서비스 미지원 — 서울 기본값'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      document.getElementById('loc-display').textContent =
        `위도 ${userLat.toFixed(4)}°  경도 ${userLon.toFixed(4)}°`;
      document.getElementById('loading').style.display = 'none';
      resize(); updateAll(); setInterval(updateAll, 60000);
    },
    () => startWithDefault('위치 권한 없음 — 서울 기본값')
  );
}

function startWithDefault(msg) {
  document.getElementById('loc-display').textContent = msg;
  document.getElementById('loading').style.display = 'none';
  resize(); updateAll(); setInterval(updateAll, 60000);
}

// ─── 전체화면 ──────────────────────────────────────────────────────────────
function toggleFullscreen() {
  if (document.fullscreenEnabled) {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  } else if (document.webkitFullscreenEnabled) {
    if (!document.webkitFullscreenElement) {
      document.documentElement.webkitRequestFullscreen();
    } else {
      document.webkitExitFullscreen();
    }
  }
}

['fullscreenchange', 'webkitfullscreenchange'].forEach(ev => {
  document.addEventListener(ev, () => {
    const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
    document.getElementById('fs-icon').innerHTML = isFS
      // 축소 아이콘
      ? '<path d="M5 1v4H1V3.5h2.5V1H5zm6 0h1.5v2.5H15V5h-4V1zM1 11h4v4H3.5v-2.5H1V11zm9 0h4v1.5h-2.5V15H10v-4z"/>'
      // 확대 아이콘
      : '<path d="M1.5 1h4v1.5H3V4H1.5V1zM11 1h4v2.5h-1.5V2H11V1zM1.5 12H3v1.5h2.5V15h-4v-3zm9 1.5H13V12h1.5v3H10v-1.5z"/>';
  });
});

// ─── PWA 아이콘 & 매니페스트 ───────────────────────────────────────────────
function drawIconCanvas(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  const cx = size / 2, r = size / 2;

  // 배경
  const bg = g.createRadialGradient(cx, cx * 0.9, 0, cx, cx, r);
  bg.addColorStop(0, '#162040');
  bg.addColorStop(1, '#010810');
  g.beginPath(); g.arc(cx, cx, r, 0, 2 * Math.PI);
  g.fillStyle = bg; g.fill();

  // 별
  [[.13,.17],[.82,.13],[.91,.35],[.08,.65],[.88,.78],
   [.20,.87],[.75,.90],[.94,.58],[.16,.39],[.68,.18],
   [.36,.09],[.05,.40],[.50,.06],[.48,.94],[.30,.75]
  ].forEach(([x, y]) => {
    g.beginPath();
    g.arc(x*size, y*size, (Math.random()*1.2+0.5)*size/100, 0, 2*Math.PI);
    g.fillStyle = `rgba(255,255,255,${.55+Math.random()*.35})`;
    g.fill();
  });

  // 행성 (목성 스타일)
  const pr  = r * 0.46;
  const glo = g.createRadialGradient(cx, cx, pr * .75, cx, cx, pr * 1.25);
  glo.addColorStop(0, 'rgba(255,160,50,.18)');
  glo.addColorStop(1, 'transparent');
  g.beginPath(); g.arc(cx, cx, pr * 1.25, 0, 2*Math.PI);
  g.fillStyle = glo; g.fill();

  const pg = g.createRadialGradient(cx * .85, cx * .82, 0, cx, cx, pr);
  pg.addColorStop(0,    '#fff8e0');
  pg.addColorStop(.22,  '#ffd060');
  pg.addColorStop(.58,  '#cc8030');
  pg.addColorStop(1,    '#7a3600');
  g.beginPath(); g.arc(cx, cx, pr, 0, 2*Math.PI);
  g.fillStyle = pg; g.fill();

  // 줄무늬 (클리핑)
  g.save();
  g.beginPath(); g.arc(cx, cx, pr - 1, 0, 2*Math.PI); g.clip();
  [[-0.42,.12,'rgba(130,60,15,.5)'], [-0.16,.14,'rgba(100,45,8,.42)'],
   [.10,.13,'rgba(145,68,20,.47)'],  [.34,.10,'rgba(110,48,12,.4)']
  ].forEach(([dy, dh, col]) => {
    g.beginPath();
    g.ellipse(cx, cx + pr*dy, pr, pr*dh, 0, 0, 2*Math.PI);
    g.fillStyle = col; g.fill();
  });
  // 대적점
  g.beginPath();
  g.ellipse(cx + pr*.22, cx + pr*.03, pr*.15, pr*.09, 0, 0, 2*Math.PI);
  g.fillStyle = 'rgba(185,38,12,.68)'; g.fill();
  // 하이라이트
  g.beginPath();
  g.ellipse(cx - pr*.2, cx - pr*.27, pr*.22, pr*.14, -.4, 0, 2*Math.PI);
  g.fillStyle = 'rgba(255,255,255,.13)'; g.fill();
  g.restore();

  return c;
}

function setupPWA() {
  const icon192 = drawIconCanvas(192).toDataURL('image/png');
  const icon512 = drawIconCanvas(512).toDataURL('image/png');

  document.getElementById('apple-icon').href = icon192;
  document.querySelector('link[rel="icon"]')?.remove();
  const favLink = document.createElement('link');
  favLink.rel = 'icon'; favLink.href = icon192;
  document.head.appendChild(favLink);

  const manifest = {
    name: '밤하늘 행성 관측', short_name: '행성관측',
    description: '위치 기반 실시간 행성 위치 관측',
    start_url: location.href,
    display: 'standalone', orientation: 'any',
    theme_color: '#010a1a', background_color: '#010a1a',
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any' },
      { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);
}

window.addEventListener('resize', resize);
window.addEventListener('load', () => {
  resize();
  initLocation();
  initCompass();
  setupPWA();
});
</script>
