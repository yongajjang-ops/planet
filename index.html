<script>
// ─── Math helpers ──────────────────────────────────────────────────────────
const D2R = Math.PI / 180;
const R2D = 180 / Math.PI;
const rad  = d => d * D2R;
const deg  = r => r * R2D;
const n360 = a => ((a % 360) + 360) % 360;

// ─── Time ──────────────────────────────────────────────────────────────────
function jd(date) { return date.getTime() / 86400000 + 2440587.5; }

function obliquity(T) {
  return 23.439291111 - 0.013004167*T - 1.639e-7*T*T + 5.036e-7*T*T*T;
}

function gmst(JD) {
  const T = (JD - 2451545) / 36525;
  return n360(280.46061837 + 360.98564736629*(JD-2451545) + 3.87933e-4*T*T - T*T*T/38710000);
}

function lst(JD, lon) { return n360(gmst(JD) + lon); }

// ─── Kepler solver ─────────────────────────────────────────────────────────
function kepler(M_rad, e) {
  let E = M_rad;
  for (let i = 0; i < 60; i++) {
    const dE = (M_rad - E + e*Math.sin(E)) / (1 - e*Math.cos(E));
    E += dE;
    if (Math.abs(dE) < 1e-11) break;
  }
  return E;
}

// ─── Heliocentric ecliptic XYZ from orbital elements ──────────────────────
function helio(el, T) {
  const a     = el.a  + el.da  * T;
  const e     = el.e  + el.de  * T;
  const I     = el.I  + el.dI  * T;
  const L     = n360(el.L  + el.dL  * T);
  const ww    = el.w  + el.dw  * T;   // longitude of perihelion
  const Omega = el.O  + el.dO  * T;

  const omega = n360(ww - Omega);     // argument of perihelion
  const M_rad = rad(n360(L - ww));
  const E     = kepler(M_rad, e);

  const nu = 2 * Math.atan2(
    Math.sqrt(1+e) * Math.sin(E/2),
    Math.sqrt(1-e) * Math.cos(E/2)
  );
  const r = a * (1 - e * Math.cos(E));
  const u = nu + rad(omega);

  const IRad = rad(I), OR = rad(Omega);
  return {
    x: r*(Math.cos(OR)*Math.cos(u) - Math.sin(OR)*Math.sin(u)*Math.cos(IRad)),
    y: r*(Math.sin(OR)*Math.cos(u) + Math.cos(OR)*Math.sin(u)*Math.cos(IRad)),
    z: r*Math.sin(u)*Math.sin(IRad)
  };
}

// ─── Ecliptic → Equatorial ─────────────────────────────────────────────────
function ecl2eq(x, y, z, eps) {
  const e = rad(eps);
  return {
    x,
    y: y*Math.cos(e) - z*Math.sin(e),
    z: y*Math.sin(e) + z*Math.cos(e)
  };
}

// ─── Equatorial XYZ → RA/Dec ───────────────────────────────────────────────
function xyz2radec(x, y, z) {
  return {
    ra:  n360(deg(Math.atan2(y, x))),
    dec: deg(Math.atan2(z, Math.sqrt(x*x + y*y)))
  };
}

// ─── RA/Dec → Alt/Az ───────────────────────────────────────────────────────
function radec2altaz(ra, dec, LST, lat) {
  const H   = rad(n360(LST - ra));
  const dR  = rad(dec), lR = rad(lat);
  const sinA = Math.sin(dR)*Math.sin(lR) + Math.cos(dR)*Math.cos(lR)*Math.cos(H);
  const alt  = deg(Math.asin(Math.max(-1, Math.min(1, sinA))));
  const cosZ = (Math.sin(dR) - Math.sin(rad(alt))*Math.sin(lR)) / (Math.cos(rad(alt))*Math.cos(lR));
  let az = deg(Math.acos(Math.max(-1, Math.min(1, cosZ))));
  if (Math.sin(H) > 0) az = 360 - az;
  return { alt, az };
}

// ─── Orbital elements (J2000, rates per Julian century) ───────────────────
const EARTH_EL = {
  a:1.00000261, da:5.62e-6,
  e:0.01671123, de:-4.392e-5,
  I:-1.531e-5,  dI:-0.01294668,
  L:100.46457166, dL:35999.37244981,
  w:102.93768193, dw:0.32327364,
  O:0, dO:0
};

const BODIES = [
  { id:'mercury', name:'수성', en:'Mercury', color:'#b8b8b8', sz:3,
    a:0.38709927, da:3.7e-7,   e:0.20563593, de:1.906e-5,
    I:7.00497902, dI:-5.94749e-3, L:252.25032350, dL:149472.67411175,
    w:77.45779628, dw:0.16047689, O:48.33076593, dO:-0.12534081 },
  { id:'venus',   name:'금성', en:'Venus',   color:'#ffe060', sz:5,
    a:0.72333566, da:3.9e-7,   e:0.00677672, de:-4.107e-5,
    I:3.39467605, dI:-7.889e-4, L:181.97909950, dL:58517.81538729,
    w:131.60246718, dw:2.68329e-3, O:76.67984255, dO:-0.27769418 },
  { id:'mars',    name:'화성', en:'Mars',    color:'#ff5533', sz:4,
    a:1.52371034, da:1.847e-5, e:0.09339410, de:7.882e-5,
    I:1.84969142, dI:-8.13131e-3, L:-4.55343205, dL:19140.30268499,
    w:-23.94362959, dw:0.44441088, O:49.55953891, dO:-0.29257343 },
  { id:'jupiter', name:'목성', en:'Jupiter', color:'#ffaa55', sz:7,
    a:5.20288700, da:-1.1607e-4, e:0.04838624, de:-1.3253e-4,
    I:1.30439695, dI:-1.83714e-3, L:34.39644051, dL:3034.74612775,
    w:14.72847983, dw:0.21252668, O:100.47390909, dO:0.20469106 },
  { id:'saturn',  name:'토성', en:'Saturn',  color:'#ddbb70', sz:6,
    a:9.53667594, da:-1.2506e-3, e:0.05386179, de:-5.0991e-4,
    I:2.48599187, dI:1.93609e-3, L:49.95424423, dL:1222.49362201,
    w:92.59887831, dw:-0.41897216, O:113.66242448, dO:-0.28867794 },
  { id:'uranus',  name:'천왕성', en:'Uranus', color:'#88ddff', sz:3,
    a:19.18916464, da:-1.96176e-3, e:0.04725744, de:-4.397e-5,
    I:0.77263783, dI:-2.42939e-3, L:313.23810451, dL:428.48202785,
    w:170.95427630, dw:0.40805281, O:74.01692503, dO:0.04240589 },
  { id:'neptune', name:'해왕성', en:'Neptune', color:'#4488ff', sz:3,
    a:30.06992276, da:2.6291e-4, e:0.00859048, de:5.105e-5,
    I:1.77004347, dI:3.5372e-4, L:-55.12002969, dL:218.45945325,
    w:44.96476227, dw:-0.32241464, O:131.78422574, dO:-5.08664e-3 }
];

// ─── Sun position (simplified) ─────────────────────────────────────────────
function sunPosition(JD, lat, lon) {
  const T   = (JD - 2451545) / 36525;
  const L0  = n360(280.46646 + 36000.76983*T);
  const M   = n360(357.52911 + 35999.05029*T - 1.537e-4*T*T);
  const Mr  = rad(M);
  const C   = (1.914602 - 4.817e-3*T - 1.4e-5*T*T)*Math.sin(Mr)
            + (1.9993e-2 - 1.01e-4*T)*Math.sin(2*Mr)
            + 2.89e-4*Math.sin(3*Mr);
  const sunL = n360(L0 + C);
  const om  = 125.04 - 1934.136*T;
  const lam = sunL - 0.00569 - 0.00478*Math.sin(rad(om));
  const eps = obliquity(T) + 0.00256*Math.cos(rad(om));
  const lr  = rad(lam), er = rad(eps);
  const ra  = n360(deg(Math.atan2(Math.cos(er)*Math.sin(lr), Math.cos(lr))));
  const dc  = deg(Math.asin(Math.sin(er)*Math.sin(lr)));
  const LST = lst(JD, lon);
  const { alt, az } = radec2altaz(ra, dc, LST, lat);
  return { id:'sun', name:'태양', color:'#ffd700', sz:9, ra, dec:dc, alt, az, dist:1 };
}

// ─── Moon position (simplified Meeus Ch.47 main terms) ─────────────────────
function moonPosition(JD, lat, lon) {
  const T   = (JD - 2451545) / 36525;
  const L0  = n360(218.3164477 + 481267.88123421*T - 1.5786e-3*T*T);
  const Mm  = n360(134.9633964 + 477198.8675055*T  + 8.7414e-3*T*T);
  const Ms  = n360(357.5291092 + 35999.0502909*T   - 1.536e-4*T*T);
  const F   = n360(93.2720950  + 483202.0175233*T  - 3.6539e-3*T*T);
  const D   = n360(297.8501921 + 445267.1114034*T  - 1.8819e-3*T*T);
  const Om  = n360(125.0445479 - 1934.1362608*T    + 2.0754e-3*T*T);

  const dL = 6.289*Math.sin(rad(Mm))
           - 1.274*Math.sin(rad(2*D - Mm))
           + 0.658*Math.sin(rad(2*D))
           - 0.214*Math.sin(rad(2*Mm))
           - 0.186*Math.sin(rad(Ms))
           - 0.114*Math.sin(rad(2*F))
           + 0.059*Math.sin(rad(2*Mm - 2*D))
           + 0.057*Math.sin(rad(Mm - 2*D + Ms))
           + 0.053*Math.sin(rad(Mm + 2*D))
           + 0.046*Math.sin(rad(2*D - Ms))
           + 0.041*Math.sin(rad(Mm - Ms))
           - 0.035*Math.sin(rad(D))
           - 0.031*Math.sin(rad(Mm + Ms))
           - 0.015*Math.sin(rad(2*F - 2*D))
           + 0.011*Math.sin(rad(Mm - 4*D));

  const dB = 5.128*Math.sin(rad(F))
           + 0.280*Math.sin(rad(Mm+F))
           + 0.277*Math.sin(rad(Mm-F))
           + 0.173*Math.sin(rad(2*D-F))
           + 0.055*Math.sin(rad(2*D-Mm+F))
           - 0.046*Math.sin(rad(2*D-Mm-F))
           + 0.033*Math.sin(rad(2*D+F))
           + 0.017*Math.sin(rad(2*Mm+F));

  const lam  = rad(n360(L0 + dL));
  const beta = rad(dB);
  const eps  = rad(obliquity(T));

  const ra  = n360(deg(Math.atan2(Math.sin(lam)*Math.cos(eps) - Math.tan(beta)*Math.sin(eps), Math.cos(lam))));
  const dc  = deg(Math.asin(Math.sin(beta)*Math.cos(eps) + Math.cos(beta)*Math.sin(eps)*Math.sin(lam)));
  const LST = lst(JD, lon);
  const { alt, az } = radec2altaz(ra, dc, LST, lat);

  // Moon phase (0=new, 0.5=full)
  const elong = n360(deg(lam) - (n360(deg(lam) - deg(lam)))); // simplified elongation
  const elongD = n360(deg(lam) - sunPosition._lambda || 0);
  const phase = (1 - Math.cos(rad(n360(deg(lam) - (sunPosition._L0 || 0))))) / 2;

  return { id:'moon', name:'달', color:'#dde8ff', sz:7, ra, dec:dc, alt, az, dist:0.00257, phase };
}

// ─── Compute planet position ────────────────────────────────────────────────
function planetPos(body, JD, lat, lon) {
  const T   = (JD - 2451545) / 36525;
  const eps = obliquity(T);
  const LST = lst(JD, lon);

  const earth = ecl2eq(...Object.values(helio(EARTH_EL, T)), eps);
  const p     = helio(body, T);
  const peq   = ecl2eq(p.x, p.y, p.z, eps);

  const gx = peq.x - earth.x;
  const gy = peq.y - earth.y;
  const gz = peq.z - earth.z;
  const dist = Math.sqrt(gx*gx + gy*gy + gz*gz);

  const { ra, dec } = xyz2radec(gx, gy, gz);
  const { alt, az } = radec2altaz(ra, dec, LST, lat);

  return { ...body, ra, dec, alt, az, dist };
}

// ─── Canvas ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('sky-canvas');
const ctx    = canvas.getContext('2d');
let CW = 0, allBodies = [], selId = null, stars = null;

function resize() {
  const w = document.getElementById('sky-wrap').clientWidth - 20;
  const s = Math.min(w, 480);
  canvas.width = canvas.height = CW = s;
  stars = null;
  if (allBodies.length) drawSky();
}

function mkStars() {
  stars = [];
  const r = CW/2 - 6;
  for (let i = 0; i < 250; i++) {
    const ang = Math.random() * 2*Math.PI;
    const rs  = Math.random() * r;
    stars.push({ x: CW/2 + rs*Math.cos(ang), y: CW/2 + rs*Math.sin(ang),
                 r: Math.random()*1.3+0.2, a: Math.random()*0.6+0.2 });
  }
}

function altaz2xy(alt, az) {
  const r   = CW/2 - 6;
  const rho = (1 - alt/90) * r;
  return { x: CW/2 + rho*Math.sin(rad(az)), y: CW/2 - rho*Math.cos(rad(az)) };
}

function drawSky() {
  if (!CW) return;
  const cx = CW/2, cy = CW/2, R = CW/2 - 6;
  ctx.clearRect(0, 0, CW, CW);

  // Sky gradient
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
  g.addColorStop(0,   '#0d1a3a');
  g.addColorStop(0.6, '#060e22');
  g.addColorStop(1,   '#020810');
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2*Math.PI);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.clip();

  // Stars
  if (!stars) mkStars();
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, 2*Math.PI);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });

  // Altitude rings
  [30, 60].forEach(a => {
    const rr = (1 - a/90) * R;
    ctx.beginPath();
    ctx.arc(cx, cy, rr, 0, 2*Math.PI);
    ctx.strokeStyle = 'rgba(80,130,220,0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 8]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(80,130,220,0.28)';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${a}°`, cx + rr + 3, cy);
  });

  // Compass lines
  [0, 90, 180, 270].forEach(az => {
    const { x, y } = altaz2xy(0, az);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x, y);
    ctx.strokeStyle = 'rgba(80,130,220,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Compass labels
  const compass = [['N', 0,'#ff7766'], ['E', 90,'#8899cc'], ['S', 180,'#8899cc'], ['W', 270,'#8899cc']];
  ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  compass.forEach(([lbl, az, col]) => {
    const { x, y } = altaz2xy(2, az);
    ctx.fillStyle = col;
    ctx.fillText(lbl, x, y);
  });

  // Bodies
  allBodies.forEach(b => {
    if (b.alt <= 0) return;
    const { x, y } = altaz2xy(b.alt, b.az);

    // Glow
    const gd = ctx.createRadialGradient(x, y, 0, x, y, b.sz*3.5);
    gd.addColorStop(0, b.color + 'aa');
    gd.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(x, y, b.sz*3.5, 0, 2*Math.PI);
    ctx.fillStyle = gd;
    ctx.fill();

    // Body dot
    ctx.beginPath();
    ctx.arc(x, y, b.sz, 0, 2*Math.PI);
    ctx.fillStyle = b.color;
    ctx.fill();

    // Selection ring
    if (b.id === selId) {
      ctx.beginPath();
      ctx.arc(x, y, b.sz + 4, 0, 2*Math.PI);
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Label
    ctx.fillStyle = b.color;
    ctx.font = `${b.sz > 5 ? 11 : 10}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.name, x + b.sz + 5, y);

    b._cx = x; b._cy = y;
  });

  ctx.restore();

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2*Math.PI);
  ctx.strokeStyle = 'rgba(80,130,220,0.25)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Labels
  ctx.fillStyle = 'rgba(80,130,220,0.35)';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('천정', cx, cy - R + 12);
  ctx.fillText('지평선', cx, cy + R - 6);
}

// ─── Click on canvas ───────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * sx;
  const my = (e.clientY - rect.top)  * sy;

  let hit = null, best = Infinity;
  allBodies.forEach(b => {
    if (b._cx === undefined) return;
    const d = Math.hypot(mx - b._cx, my - b._cy);
    if (d < 22 && d < best) { best = d; hit = b; }
  });

  if (hit) {
    selId = hit.id;
    showPopup(hit, e.clientX, e.clientY);
  } else {
    selId = null;
    document.getElementById('info-popup').style.display = 'none';
  }
  drawSky();
  renderList();
});

function showPopup(b, cx, cy) {
  const pop = document.getElementById('info-popup');
  document.getElementById('popup-title').textContent = b.name + (b.en ? ` (${b.en})` : '');
  document.getElementById('popup-title').style.color = b.color;
  document.getElementById('popup-body').innerHTML = `
고도: ${b.alt.toFixed(2)}°<br>
방위각: ${b.az.toFixed(2)}° (${az2dir(b.az)})<br>
적경: ${(b.ra/15).toFixed(3)}h<br>
적위: ${b.dec.toFixed(3)}°<br>
거리: ${b.dist < 0.01 ? (b.dist*149597870.7).toFixed(0)+' km' : b.dist.toFixed(4)+' AU'}<br>
상태: ${b.alt > 0 ? '🟢 관측 가능' : '🔴 지평선 아래'}`;

  pop.style.display = 'block';
  const wrap = document.getElementById('sky-wrap');
  const wr = wrap.getBoundingClientRect();
  let px = cx - wr.left + 10;
  let py = cy - wr.top  - 60;
  px = Math.max(4, Math.min(px, wr.width - 175));
  py = Math.max(4, py);
  pop.style.left = px + 'px';
  pop.style.top  = py + 'px';
}

// ─── Planet list ───────────────────────────────────────────────────────────
function az2dir(az) {
  const d = ['북','북북동','북동','동북동','동','동남동','남동','남남동',
             '남','남남서','남서','서남서','서','서북서','북서','북북서'];
  return d[Math.round(az / 22.5) % 16];
}

function renderList() {
  const el = document.getElementById('planet-list');
  const sorted = [...allBodies].sort((a, b) => b.alt - a.alt);
  el.innerHTML = sorted.map(b => `
    <div class="planet-row ${b.alt>0?'above':''} ${b.id===selId?'selected':''}" data-id="${b.id}">
      <div class="p-dot" style="background:${b.color}"></div>
      <div class="p-name" style="color:${b.color}">${b.name}</div>
      <div class="p-coords">
        고도 ${b.alt.toFixed(1)}° · 방위 ${b.az.toFixed(1)}° (${az2dir(b.az)})<br>
        거리 ${b.dist<0.01?(b.dist*149597870.7).toFixed(0)+' km':b.dist.toFixed(3)+' AU'}
      </div>
      <div class="p-badge ${b.alt>0?'badge-vis':'badge-hid'}">${b.alt>0?'관측 가능':'지평선 아래'}</div>
    </div>`).join('');

  el.querySelectorAll('.planet-row').forEach(row => {
    row.addEventListener('click', () => {
      const b = allBodies.find(x => x.id === row.dataset.id);
      if (!b) return;
      selId = b.id;
      drawSky();
      renderList();
      if (b.alt > 0 && b._cx !== undefined) {
        const wrap = document.getElementById('sky-wrap');
        const wr = wrap.getBoundingClientRect();
        const scaleX = CW / (wr.width - 20);
        showPopup(b, wr.left + b._cx/scaleX, wr.top + b._cy/scaleX);
      } else {
        showPopup(b, 60, 60);
      }
    });
  });
}

// ─── Sky condition banner ──────────────────────────────────────────────────
function skyCondition() {
  const sun = allBodies.find(b => b.id === 'sun');
  if (!sun) return;
  const a = sun.alt;
  let msg = '';
  if      (a > 6)   msg = '🌞 낮 — 행성 관측 불가';
  else if (a > 0)   msg = '🌅 일출/일몰 — 수성·금성 탐색 가능';
  else if (a > -6)  msg = '🌆 박명(시민 박명) — 밝은 행성 관측';
  else if (a > -12) msg = '🌇 항해 박명 — 대부분 행성 관측';
  else if (a > -18) msg = '🌃 천문 박명 — 거의 야간';
  else              msg = '🌌 완전 야간 — 최적 관측';
  document.getElementById('sky-condition').textContent = msg;
}

// ─── Main update ───────────────────────────────────────────────────────────
let userLat = 37.5665, userLon = 126.9780;

function updateAll() {
  const now = new Date();
  const JD  = jd(now);

  // Time display
  document.getElementById('time-display').textContent =
    now.toLocaleDateString('ko-KR', {year:'numeric',month:'short',day:'numeric'}) + '  ' +
    now.toLocaleTimeString('ko-KR');

  // All bodies
  allBodies = [
    sunPosition(JD, userLat, userLon),
    moonPosition(JD, userLat, userLon),
    ...BODIES.map(b => planetPos(b, JD, userLat, userLon))
  ];

  drawSky();
  renderList();
  skyCondition();
}

// ─── Geolocation ───────────────────────────────────────────────────────────
function initLocation() {
  if (!navigator.geolocation) { startWithDefault('위치 서비스 미지원 — 서울 기본값'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      document.getElementById('loc-display').textContent =
        `위도 ${userLat.toFixed(4)}°  경도 ${userLon.toFixed(4)}°`;
      document.getElementById('loading').style.display = 'none';
      resize();
      updateAll();
      setInterval(updateAll, 60000);
    },
    () => startWithDefault('위치 권한 없음 — 서울 기본값')
  );
}

function startWithDefault(msg) {
  document.getElementById('loc-display').textContent = msg;
  document.getElementById('loading').style.display = 'none';
  resize();
  updateAll();
  setInterval(updateAll, 60000);
}

// ─── Compass ───────────────────────────────────────────────────────────────
const compassCanvas = document.getElementById('compass-canvas');
const cctx = compassCanvas.getContext('2d');
let compassHeading = null;   // null = unknown
let compassSmooth  = null;   // smoothed angle for animation

const DIR16 = ['북','북북동','북동','동북동','동','동남동','남동','남남동',
               '남','남남서','남서','서남서','서','서북서','북서','북북서'];

function heading2name(h) { return DIR16[Math.round(h / 22.5) % 16]; }

function drawCompass(heading) {
  const W = compassCanvas.width, H = compassCanvas.height;
  const cx = W/2, cy = H/2, R = W/2 - 4;
  cctx.clearRect(0, 0, W, H);

  // Outer bezel
  const bezel = cctx.createRadialGradient(cx, cy, R-6, cx, cy, R);
  bezel.addColorStop(0, 'rgba(30,60,120,0.8)');
  bezel.addColorStop(1, 'rgba(10,20,50,0.9)');
  cctx.beginPath();
  cctx.arc(cx, cy, R, 0, 2*Math.PI);
  cctx.fillStyle = bezel;
  cctx.fill();
  cctx.strokeStyle = 'rgba(80,130,255,0.3)';
  cctx.lineWidth = 1.5;
  cctx.stroke();

  // Inner sky
  const sky = cctx.createRadialGradient(cx, cy, 0, cx, cy, R-7);
  sky.addColorStop(0, '#0d1a3a');
  sky.addColorStop(1, '#060e20');
  cctx.beginPath();
  cctx.arc(cx, cy, R-7, 0, 2*Math.PI);
  cctx.fillStyle = sky;
  cctx.fill();

  // Rotate canvas by -heading so North points up relative to real north
  const rotAngle = heading !== null ? -rad(heading) : 0;
  cctx.save();
  cctx.translate(cx, cy);
  cctx.rotate(rotAngle);

  // Tick marks (every 10°)
  for (let i = 0; i < 36; i++) {
    const a = rad(i * 10);
    const inner = i % 9 === 0 ? R-22 : (i % 3 === 0 ? R-18 : R-14);
    cctx.beginPath();
    cctx.moveTo(Math.sin(a)*(R-8), -Math.cos(a)*(R-8));
    cctx.lineTo(Math.sin(a)*inner,  -Math.cos(a)*inner);
    cctx.strokeStyle = i % 9 === 0 ? 'rgba(160,190,255,0.7)' : 'rgba(80,120,200,0.35)';
    cctx.lineWidth = i % 9 === 0 ? 1.5 : 0.8;
    cctx.stroke();
  }

  // Cardinal & intercardinal labels
  const cardinals = [
    ['N', 0, '#ff6655', 13],
    ['E', 90, '#99aadd', 10],
    ['S', 180, '#99aadd', 10],
    ['W', 270, '#99aadd', 10],
    ['NE', 45, '#667799', 8],
    ['SE', 135, '#667799', 8],
    ['SW', 225, '#667799', 8],
    ['NW', 315, '#667799', 8],
  ];
  cardinals.forEach(([lbl, az, col, fs]) => {
    const a = rad(az);
    const lr = R - 28;
    cctx.save();
    cctx.translate(Math.sin(a)*lr, -Math.cos(a)*lr);
    cctx.fillStyle = col;
    cctx.font = `bold ${fs}px sans-serif`;
    cctx.textAlign = 'center';
    cctx.textBaseline = 'middle';
    cctx.fillText(lbl, 0, 0);
    cctx.restore();
  });

  cctx.restore(); // end rotation

  // Needle — always points up (= North direction after rotation)
  if (heading !== null) {
    // North needle (red)
    cctx.save();
    cctx.translate(cx, cy);
    cctx.beginPath();
    cctx.moveTo(0, -(R-32));
    cctx.lineTo(-5, 8);
    cctx.lineTo(0, 4);
    cctx.lineTo(5, 8);
    cctx.closePath();
    cctx.fillStyle = '#ff4444';
    cctx.fill();
    // South needle (white)
    cctx.beginPath();
    cctx.moveTo(0, R-32);
    cctx.lineTo(-5, -8);
    cctx.lineTo(0, -4);
    cctx.lineTo(5, -8);
    cctx.closePath();
    cctx.fillStyle = 'rgba(220,230,255,0.8)';
    cctx.fill();
    // Center dot
    cctx.beginPath();
    cctx.arc(0, 0, 4, 0, 2*Math.PI);
    cctx.fillStyle = '#ccd8ff';
    cctx.fill();
    cctx.restore();
  } else {
    // No sensor — draw static question mark style
    cctx.save();
    cctx.translate(cx, cy);
    cctx.fillStyle = 'rgba(80,100,140,0.5)';
    cctx.font = 'bold 22px sans-serif';
    cctx.textAlign = 'center';
    cctx.textBaseline = 'middle';
    cctx.fillText('?', 0, 0);
    cctx.restore();
  }

  // Fixed north indicator triangle at top
  cctx.save();
  cctx.translate(cx, cy);
  cctx.beginPath();
  cctx.moveTo(0, -(R-2));
  cctx.lineTo(-4, -(R-10));
  cctx.lineTo(4,  -(R-10));
  cctx.closePath();
  cctx.fillStyle = 'rgba(255,100,80,0.6)';
  cctx.fill();
  cctx.restore();
}

function updateCompassUI(heading) {
  const hdEl   = document.getElementById('compass-heading');
  const dirEl  = document.getElementById('compass-dir-name');
  const noteEl = document.getElementById('compass-note');

  if (heading === null) {
    hdEl.textContent  = '---°';
    dirEl.textContent = '---';
    noteEl.innerHTML  = '센서 없음<br>데스크톱에서는 미지원';
    drawCompass(null);
    return;
  }

  hdEl.textContent  = Math.round(heading) + '°';
  dirEl.textContent = heading2name(heading);
  noteEl.innerHTML  = '기기를 수평으로 들어주세요';
  drawCompass(heading);
}

// Smooth angle (shortest arc interpolation)
function smoothAngle(current, target, factor) {
  if (current === null) return target;
  let diff = target - current;
  while (diff >  180) diff -= 360;
  while (diff < -180) diff += 360;
  return current + diff * factor;
}

let compassAnimFrame = null;
function animateCompass(targetHeading) {
  compassSmooth = smoothAngle(compassSmooth, targetHeading, 0.15);
  updateCompassUI(compassSmooth);
  if (Math.abs(smoothAngle(compassSmooth, targetHeading, 1)) > 0.3) {
    compassAnimFrame = requestAnimationFrame(() => animateCompass(targetHeading));
  } else {
    updateCompassUI(targetHeading);
  }
}

function onOrientation(e) {
  let heading = null;

  if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
    // iOS — direct compass heading
    heading = e.webkitCompassHeading;
  } else if (e.absolute && e.alpha !== null) {
    // Android with absolute orientation
    heading = (360 - e.alpha) % 360;
  } else if (e.alpha !== null) {
    // Non-absolute — use alpha as approximation
    heading = (360 - e.alpha) % 360;
  }

  if (heading === null) return;
  compassHeading = heading;
  if (compassAnimFrame) cancelAnimationFrame(compassAnimFrame);
  animateCompass(heading);
}

function requestCompass() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') {
          window.addEventListener('deviceorientationabsolute', onOrientation, true);
          window.addEventListener('deviceorientation', onOrientation, true);
          document.getElementById('compass-btn').style.display = 'none';
        } else {
          document.getElementById('compass-note').innerHTML = '권한이 거부되었습니다';
        }
      })
      .catch(() => {
        document.getElementById('compass-note').innerHTML = '권한 요청 실패';
      });
  }
}

function initCompass() {
  drawCompass(null);

  if (typeof DeviceOrientationEvent === 'undefined') {
    updateCompassUI(null);
    return;
  }

  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+ — need explicit permission button
    document.getElementById('compass-btn').style.display = 'inline-block';
    document.getElementById('compass-note').innerHTML = '아래 버튼을 눌러<br>나침반을 활성화하세요';
    drawCompass(null);
  } else {
    // Android / other — auto start
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
    window.addEventListener('deviceorientation', onOrientation, true);
    document.getElementById('compass-note').innerHTML = '기기를 수평으로 들어주세요';
  }
}

window.addEventListener('resize', resize);
window.addEventListener('load', () => {
  resize();
  initLocation();
  initCompass();
});
</script>
